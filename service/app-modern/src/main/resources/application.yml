spring:
  application:
    name: insurance-service
  threads:
    virtual:
      enabled: ${SPRING_THREADS_VIRTUAL_ENABLED:false}
  flyway:
    enabled: true
    locations: classpath:db/migration
    mixed: true
  datasource:
    url: jdbc:sqlite:${DB_PATH:/tmp/insurance.db}
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      pool-name: insurance-write
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

server:
  shutdown: graceful
  http2:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
