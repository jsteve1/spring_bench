spring:
  application:
    name: insurance-service
  flyway:
    enabled: true
    locations: classpath:db/migration
  datasource:
    url: jdbc:sqlite:${DB_PATH:/tmp/insurance.db}
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      pool-name: insurance-write
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

server:
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
